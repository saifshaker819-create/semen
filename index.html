<style>
:root{
  --bg:#04070d;
  --bg2:#070d1a;
  --cyan:#00d4ff;
  --purple:#8b3fff;
  --green:#00ff9d;
  --red:#ff2244;
  --text:#eef4fb;
  --text2:rgba(238,244,251,.58);
  --line:rgba(0,212,255,.16);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Cairo',sans-serif;
  overflow-x:hidden;
  position:relative;
}

/* خلفية نبضية متحركة */
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(0,212,255,.10), transparent 45%),
    radial-gradient(circle at 85% 75%, rgba(139,63,255,.12), transparent 45%),
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:auto,auto,42px 42px,42px 42px;
  pointer-events:none;
}

/* ===== HERO ===== */
.hero{
  position:relative;z-index:1;
  min-height:92vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:40px 20px;
  overflow:hidden;
}
.ecg-wrap{
  position:absolute;left:0;right:0;top:50%;
  height:120px;
  opacity:.5;
  transform:translateY(-50%);
  pointer-events:none;
}
.ecg-line{
  width:200%;height:100%;
  stroke:var(--green);
  stroke-width:2;
  fill:none;
  filter:drop-shadow(0 0 6px var(--green));
  animation:ecgmove 6s linear infinite;
}
@keyframes ecgmove{from{transform:translateX(0);}to{transform:translateX(-50%);}}

.logo-pulse{
  width:84px;height:84px;
  border-radius:22px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:38px;
  margin-bottom:22px;
  box-shadow:0 0 0 0 rgba(0,212,255,.5);
  animation:pulseGlow 2.4s ease-out infinite;
}
@keyframes pulseGlow{
  0%{box-shadow:0 0 0 0 rgba(0,212,255,.45);}
  70%{box-shadow:0 0 0 22px rgba(0,212,255,0);}
  100%{box-shadow:0 0 0 0 rgba(0,212,255,0);}
}
.hero h1{
  font-size:clamp(34px,7vw,64px);
  font-weight:900;
  letter-spacing:-1px;
  background:linear-gradient(90deg,#fff,var(--cyan) 55%,var(--purple));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:riseIn .8s .1s both;
}
.hero .sub{
  margin-top:14px;
  font-size:clamp(15px,2.4vw,19px);
  color:var(--text2);
  max-width:560px;
  animation:riseIn .8s .25s both;
}
.hero .tagline{
  margin-top:28px;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--green);
  letter-spacing:2px;
  border:1px solid rgba(0,255,157,.3);
  padding:8px 18px;
  border-radius:30px;
  background:rgba(0,255,157,.06);
  animation:riseIn .8s .4s both;
}
@keyframes riseIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.scrolldown{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  color:var(--text2);font-size:12px;display:flex;flex-direction:column;align-items:center;gap:6px;
  animation:riseIn .8s .6s both;
}
.scrolldown .chevron{width:9px;height:9px;border-right:2px solid var(--cyan);border-bottom:2px solid var(--cyan);transform:rotate(45deg);animation:bounce 1.6s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(45deg);}50%{transform:translateY(6px) rotate(45deg);}}

/* ===== SECTION STRUCTURE ===== */
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:10px 20px 100px;}
.cat{
  margin-top:70px;
}
.cat-head{
  display:flex;align-items:center;gap:14px;
  margin-bottom:26px;
  opacity:0;transform:translateY(24px);
  transition:all .7s cubic-bezier(.2,.8,.2,1);
}
.cat-head.show{opacity:1;transform:translateY(0);}
.cat-ico{
  width:52px;height:52px;flex:0 0 52px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  background:linear-gradient(145deg, rgba(0,212,255,.16), rgba(139,63,255,.16));
  border:1px solid var(--line);
}
.cat-head h2{font-size:clamp(20px,3.4vw,27px);font-weight:800;}
.cat-head .cat-count{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--text2);
  border:1px solid var(--line);
  border-radius:20px;padding:3px 12px;
  margin-right:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:14px;
}
.card{
  background:linear-gradient(160deg, rgba(255,255,255,.045), rgba(255,255,255,.015));
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px 18px 16px;
  opacity:0;transform:translateY(26px) scale(.97);
  transition:opacity .6s cubic-bezier(.2,.8,.2,1), transform .6s cubic-bezier(.2,.8,.2,1), border-color .3s, background .3s;
  position:relative;
  overflow:hidden;
}
.card.show{opacity:1;transform:translateY(0) scale(1);}
.card:hover{
  border-color:rgba(0,212,255,.55);
  background:linear-gradient(160deg, rgba(0,212,255,.09), rgba(139,63,255,.05));
}
.card::before{
  content:'';position:absolute;top:-40%;right:-40%;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle, rgba(0,212,255,.18), transparent 70%);
  opacity:0;transition:opacity .4s;
}
.card:hover::before{opacity:1;}
.card .ico{font-size:22px;margin-bottom:10px;display:inline-block;}
.card h3{font-size:15.5px;font-weight:800;margin-bottom:6px;line-height:1.4;}
.card p{font-size:13px;color:var(--text2);line-height:1.75;}

/* شريط تقدم علوي */
.progress-bar{
  position:fixed;top:0;right:0;left:0;height:3px;z-index:50;
  background:linear-gradient(90deg,var(--cyan),var(--purple),var(--green));
  transform-origin:right;
  transform:scaleX(0);
}

/* الفوتر */
.footer{
  position:relative;z-index:1;
  text-align:center;padding:60px 20px 90px;
  color:var(--text2);font-size:13px;
}
.footer .brand{
  font-family:'JetBrains Mono',monospace;
  color:var(--cyan);letter-spacing:1px;font-size:12px;margin-bottom:10px;
}
.footer .big{font-size:22px;font-weight:900;color:var(--text);margin-bottom:8px;}
.wa-btn{
  margin-top:26px;
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 30px;
  border-radius:40px;
  background:linear-gradient(135deg,#25D366,#1aa14a);
  color:#04140a;
  font-weight:800;font-size:15px;
  text-decoration:none;
  box-shadow:0 0 0 0 rgba(37,211,102,.55);
  animation:waPulse 2.4s ease-out infinite;
  transition:transform .25s;
}
.wa-btn:hover{transform:translateY(-3px) scale(1.03);}
@keyframes waPulse{
  0%{box-shadow:0 0 0 0 rgba(37,211,102,.5);}
  70%{box-shadow:0 0 0 16px rgba(37,211,102,0);}
  100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

@media (max-width:520px){
  .cat-head{gap:10px;}
  .cat-ico{width:44px;height:44px;font-size:20px;}
}
</style>
</head>

];

const content = document.getElementById('content');
DATA.forEach((cat, ci)=>{
  const catCount = cat.cards.length;
  const section = document.createElement('div');
  section.className = 'cat';
  section.innerHTML = `
    <div class="cat-head">
      <div class="cat-ico">${cat.icon}</div>
      <h2>${cat.title}</h2>
      <div class="cat-count">${catCount} ميزة</div>
    </div>
    <div class="grid">
      ${cat.cards.map(c=>`
        <div class="card">
          <span class="ico">${c.i}</span>
          <h3>${c.t}</h3>
          <p>${c.d}</p>
        </div>
      `).join('')}
    </div>
  `;
  content.appendChild(section);
});

// Scroll reveal
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('show');
    }
  });
}, {threshold:0.15});

document.querySelectorAll('.cat-head, .card').forEach((el,idx)=>{
  el.style.transitionDelay = (idx % 6) * 0.06 + 's';
  observer.observe(el);
});

// Progress bar
const bar = document.getElementById('progressBar');
window.addEventListener('scroll', ()=>{
  const h = document.documentElement;
  const scrolled = h.scrollTop / (h.scrollHeight - h.clientHeight);
  bar.style.transform = `scaleX(${scrolled})`;
});
</script>
</body>
</html>
